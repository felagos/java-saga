server:
  port: 8080

spring:
  application:
    name: bff
  datasource:
    url: jdbc:mariadb://localhost:3306/monolith
    username: saga
    password: saga
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

inventory:
  seed:
    product-id: sku-1
    initial-stock: 100

payments:
  simulate:
    reject: false

shipping:
  simulate:
    fail: false

logging:
  level:
    com.saga.checkout: INFO
