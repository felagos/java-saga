services:
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./infra/mariadb-init.sql:/docker-entrypoint-initdb.d/mariadb-init.sql
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  bff:
    build: ./saga
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/monolith
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mariadb-data:
